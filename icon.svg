<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a3d"/>
      <stop offset="50%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#071f1c"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#2dd4bf"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#2dd4bf;stop-opacity:0.8"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Outer glow ring -->
  <rect x="18" y="18" width="476" height="476" rx="96" fill="none" stroke="url(#ring)" stroke-width="3" opacity="0.6"/>
  <!-- Inner subtle ring -->
  <rect x="36" y="36" width="440" height="440" rx="82" fill="none" stroke="url(#ring)" stroke-width="1.5" opacity="0.3"/>
  <!-- RB text -->
  <text x="256" y="330" 
    font-family="Georgia, serif" 
    font-weight="900" 
    font-size="230" 
    text-anchor="middle" 
    fill="url(#textGrad)"
    letter-spacing="-8">RB</text>
  <!-- Bottom label -->
  <text x="256" y="430" 
    font-family="Arial, sans-serif" 
    font-weight="700" 
    font-size="36" 
    text-anchor="middle" 
    fill="#2dd4bf"
    letter-spacing="12"
    opacity="0.7">PERSONAL</text>
  <!-- Corner accent dots -->
  <circle cx="80" cy="80" r="6" fill="#a855f7" opacity="0.5"/>
  <circle cx="432" cy="80" r="6" fill="#2dd4bf" opacity="0.5"/>
  <circle cx="80" cy="432" r="6" fill="#2dd4bf" opacity="0.5"/>
  <circle cx="432" cy="432" r="6" fill="#a855f7" opacity="0.5"/>
</svg>
